AWSTemplateFormatVersion: '2010-09-09'
Description: Single DynamoDB table backing the Illes Balears Arcade app (mapping, scores, access log, admins).

Parameters:
  TableName:
    Type: String
    Default: balears-app
    Description: Name of the DynamoDB table.

Resources:
  AppTable:
    Type: AWS::DynamoDB::Table
    UpdateReplacePolicy: Retain
    DeletionPolicy: Retain
    Properties:
      TableName: !Ref TableName
      # Single-table design: every entity is discriminated by the pk prefix
      # (MAPPING / SCORE / ACCESS / ADMIN). All entities here are low volume.
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      # Access-log entries carry a `ttl` epoch so DynamoDB expires them on its
      # own after 90 days. Other entities simply omit the attribute.
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

Outputs:
  TableName:
    Description: DynamoDB table name (set as DYNAMODB_TABLE in Vercel).
    Value: !Ref AppTable
    Export:
      Name: !Sub '${AWS::StackName}-TableName'
  TableArn:
    Description: DynamoDB table ARN (used to scope the IAM policy).
    Value: !GetAtt AppTable.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TableArn'
