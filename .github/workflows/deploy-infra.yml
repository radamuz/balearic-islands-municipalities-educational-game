name: Deploy infra (DynamoDB)

# Deploys the CloudFormation stack that owns the DynamoDB table.
# Runs on demand, or automatically when the template changes on main.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'

env:
  AWS_REGION: eu-west-1
  STACK_NAME: balears-app
  TABLE_NAME: balears-app

# Never let two stack updates race each other.
concurrency:
  group: deploy-infra
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate template
        run: aws cloudformation validate-template --template-body file://infra/dynamodb.yml

      - name: Deploy stack
        run: |
          aws cloudformation deploy \
            --template-file infra/dynamodb.yml \
            --stack-name "$STACK_NAME" \
            --parameter-overrides TableName="$TABLE_NAME" \
            --no-fail-on-empty-changeset

      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' \
            --output table
