<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Juego Educacional - Illes Balears</title>
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/map.css">
  <link rel="stylesheet" href="/styles/modal.css">
</head>
<body>
  <header>
    <h1>Juego: Arrastra la isla/municipio al mapa</h1>
    <p>Arrastra cada nombre a su lugar en el mapa. Verás si aciertas.</p>
  </header>

  <main>
    <section id="panels">
      <aside id="lists"></aside>
      <div id="map-area">
        <div id="map-toolbar" aria-hidden="false">
          <button id="zoom-in" title="Acercar">＋</button>
          <button id="zoom-out" title="Alejar">−</button>
          <button id="zoom-reset" title="Restablecer">⟳</button>
          <button id="edit-mapping" title="Editar mapeo">🗺️ Mapeo</button>
          <button id="save-mapping" title="Guardar mapeo">💾 Guardar</button>
          <button id="show-solution" title="Ver solución">👁️ Solución</button>
          <button id="toggle-lists-mobile" class="mobile-only" title="Mostrar/Ocultar lista">☰</button>
        </div>
        <div id="map-container">Cargando mapa...</div>
        <div id="score">Aciertos: <span id="correct">0</span></div>
      </div>
    </section>
  </main>

  <template id="list-template">
    <section class="source">
      <h2 class="source-title"></h2>
      <ul class="items"></ul>
    </section>
  </template>

  <div id="mapping-modal" class="hidden">
    <div class="mapping-modal-box">
      <h3>Asignar nombre a esta forma</h3>
      <select id="mapping-select"></select>
      <div class="mapping-modal-actions">
        <button id="mapping-clear" type="button">Quitar asignación</button>
        <button id="mapping-cancel" type="button">Cancelar</button>
        <button id="mapping-confirm" type="button">Asignar</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
